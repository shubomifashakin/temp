name: Secret Scanning

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
  schedule:
    - cron: '0 0 * * *'

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'schedule' && 'dev' || github.ref }}

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: 8.30.1

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [secret-scanning]
    if: always()
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.secret-scanning.result != 'failure' && 'success' || 'failure' }}
          title: 'Secret Scanning'
          description: |
            **Commit:** ${{ github.event.pull_request.title || 'Scheduled Scan/Workflow Run' }} 
            **Triggered by:** ${{ github.actor }}
            **Branch:** ${{ github.head_ref || github.ref_name }}
            **Repository:** ${{ github.repository }}
          url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
