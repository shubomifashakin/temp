name: Secret Scanning

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
  schedule:
    - cron: '0 0 * * *'

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'schedule' && 'dev' || github.ref }}

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --config .gitleaks.toml \
            --redact --verbose --exit-code 1 \
            --report-format sarif --report-path gitleaks-results.sarif

      - name: Upload to security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'gitleaks-results.sarif'
          category: 'gitleaks'

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [secret-scanning]
    if: always()
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.secret-scanning.result != 'failure' && 'success' || 'failure' }}
          title: 'Secret Scanning'
          description: |
            **Commit:** ${{ github.event.pull_request.title || 'Scheduled Scan/Workflow Run' }} 
            **Triggered by:** ${{ github.actor }}
            **Branch:** ${{ github.head_ref || github.ref_name }}
            **Repository:** ${{ github.repository }}
          url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
